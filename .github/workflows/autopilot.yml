# Cloud Paper Autopilot — runs the SIMULATED autopilot on a schedule in the
# cloud (no phone or computer needed) and notifies via Telegram on trades.
#
# State lives in state/autopilot-state.json, committed back each run so the
# next run resumes. SIMULATED money only — the core has no live-order path.
#
# Telegram is optional: set repo secrets TELEGRAM_BOT_TOKEN and
# TELEGRAM_CHAT_ID to receive notifications. Without them the autopilot still
# runs and accumulates state; it just doesn't notify.

name: Cloud Paper Autopilot

on:
  schedule:
    # GitHub's scheduler is unreliable at high frequency (it skipped our
    # every-5-min runs for hours). Instead we trigger ~every 30 min and each
    # run loops internally (LOOP_CYCLES) doing a cycle every 5 min, so one
    # trigger covers ~25 min. Runs stay under the 30-min gap (no backlog).
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      test_message:
        description: 'Send a Telegram test message this run (verify notifications)'
        type: boolean
        default: false

# Prevent overlapping runs from racing on the committed state file.
concurrency:
  group: autopilot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    # Long runs bridge GitHub's sparse scheduler (it can fire only every
    # 5–7h). The runner ALSO persists state mid-run (~every 30 min), so trades
    # show up promptly and survive a cancelled run — reliable even without the
    # external clock. Headroom under the 6h cap.
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the state commit can rebase onto an advanced main.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run autopilot cycles (internal 5-min loop)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_TEST_MESSAGE: ${{ inputs.test_message }}
          # Timezone for the 08:00 & 22:00 daily digests. Set this repo
          # Variable to follow you when you travel (e.g. Europe/Brussels).
          # Defaults to Asia/Jerusalem when unset.
          SUMMARY_TIMEZONE: ${{ vars.SUMMARY_TIMEZONE }}
          # ~70 cycles × 5 min ≈ 5h50m of coverage per triggered run, so one
          # sparse GitHub trigger bridges the gap to the next (the free
          # scheduler often fires only every 5–7h). The runner ALSO persists
          # state every ~30 min mid-run (STATE_COMMIT_EVERY), so trades show up
          # promptly and survive a cancelled run — reliable even without the
          # external clock. See docs/cloud-autopilot.he.md.
          LOOP_CYCLES: '70'
          # Persist state to git mid-run every N cycles (≈30 min at 5-min
          # cycles), not just at the end of the ~6h run.
          STATE_COMMIT_EVERY: '6'
        run: npx tsx server/autopilotRunner.mts
      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/autopilot-state.json
          if git diff --staged --quiet; then
            echo "No state change."
            exit 0
          fi
          git commit -m "Autopilot state ${GITHUB_RUN_ID}"
          # main often advances mid-run (code merges, the Pages deploy, or a
          # previous autopilot run). A plain push would then be REJECTED and
          # the state would never land — so the next run re-loads stale state
          # and re-processes/re-alerts the same trades. Rebase our single
          # state-file commit onto the latest main (ours wins on the state
          # file, which only this job writes) and retry with backoff so the
          # state ALWAYS persists.
          pushed=""
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              pushed="yes"
              break
            fi
            echo "Push rejected — rebasing onto latest main (attempt $attempt)."
            git fetch origin main || true
            git rebase -X theirs origin/main || git rebase --abort || true
            sleep $((attempt * 3))
          done
          if [ -z "$pushed" ]; then
            echo "::error::Could not persist autopilot state after retries." >&2
            exit 1
          fi
          echo "State persisted."
